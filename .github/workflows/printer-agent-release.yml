name: Printer Agent Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches VERSION
        shell: pwsh
        run: |
          $tag = "$env:GITHUB_REF_NAME".TrimStart('v')
          $version = (Get-Content -LiteralPath "sasist-printer-agent/VERSION" -Raw).Trim()
          if ($tag -ne $version) {
            throw "Git tag v$tag does not match sasist-printer-agent/VERSION ($version)"
          }
          Write-Host "Release version OK: $version"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pywin32 pystray Pillow requests pytest

      - name: Build installer
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File installer/build.ps1

      - name: Verify local release build
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File scripts/verify-release.ps1 -SkipGithub

      - name: Upload GitHub Release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Output/SasistPrinterAgent-Setup-*.exe
            installer/build-manifest.json
          generate_release_notes: true
