name: Printer Agent Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "$env:GITHUB_REF_NAME".Trim()
          $version = $tag.TrimStart('v')
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Tag must be vX.Y.Z semver, got: $tag"
          }
          $fileVersion = (Get-Content -LiteralPath "sasist-printer-agent/VERSION" -Raw).Trim()
          if ($fileVersion -ne $version) {
            throw "Git tag v$version does not match sasist-printer-agent/VERSION ($fileVersion). Bump VERSION before tagging."
          }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Release version OK: $version"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pywin32 pystray Pillow requests pytest customtkinter

      - name: Build installer
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File installer/build.ps1

      - name: Verify local release build
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File scripts/verify-release.ps1 -Version ${{ steps.version.outputs.version }} -SkipGithub

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          powershell -ExecutionPolicy Bypass -File scripts/lib/publish-agent-github-release.ps1 -Version ${{ steps.version.outputs.version }}

      - name: Verify published release
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File scripts/verify-release.ps1 -Version ${{ steps.version.outputs.version }}
