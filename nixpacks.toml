# Fallback only — production backend uses Dockerfile (railway.json builder=DOCKERFILE).
# If you force Nixpacks in Railway dashboard, this file must install Node + Puppeteer deps.

providers = ["python"]

[variables]
NIXPACKS_PYTHON_VERSION = "3.12"
NIXPACKS_PYTHON_PACKAGE_MANAGER = "requirements"

[phases.setup]
nixPkgs = ["nodejs_20", "npm-9_x"]
aptPkgs = [
  "fonts-liberation",
  "libasound2",
  "libatk-bridge2.0-0",
  "libatk1.0-0",
  "libcups2",
  "libdbus-1-3",
  "libdrm2",
  "libgbm1",
  "libgtk-3-0",
  "libnspr4",
  "libnss3",
  "libx11-xcb1",
  "libxcomposite1",
  "libxdamage1",
  "libxrandr2",
  "libxss1",
  "libxtst6",
  "xdg-utils",
]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "cd backend/scripts/structure_report_pdf && npm ci --omit=dev",
  "node --version",
  "test -f backend/scripts/structure_report_pdf/render.mjs",
]

[start]
cmd = "python3 run_server.py"
