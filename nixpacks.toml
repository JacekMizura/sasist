# SASIST backend API — Nixpacks (Railway default builder).
#
# Python = główny runtime (FastAPI).
# Node   = tylko Puppeteer PDF (backend/scripts/structure_report_pdf).
# Root package.json jest legacy — NIE instalujemy npm w katalogu głównym
# (node provider install jest nadpisany poniżej).

providers = ["python", "node"]

[variables]
NIXPACKS_PYTHON_VERSION = "3.12"
NIXPACKS_PYTHON_PACKAGE_MANAGER = "requirements"
NIXPACKS_NODE_VERSION = "20"

[phases.setup]
# Chromium/Puppeteer — biblioteki systemowe (Debian/apt w obrazie Nixpacks).
aptPkgs = [
  "...",
  "fonts-liberation",
  "libasound2",
  "libatk-bridge2.0-0",
  "libatk1.0-0",
  "libcups2",
  "libdbus-1-3",
  "libdrm2",
  "libgbm1",
  "libgtk-3-0",
  "libnspr4",
  "libnss3",
  "libx11-xcb1",
  "libxcomposite1",
  "libxdamage1",
  "libxrandr2",
  "libxss1",
  "libxtst6",
  "xdg-utils",
]

# Zamiast npm w repo root (package.json legacy) — tylko renderer PDF.
[phases."node:install"]
cmds = [
  "node --version",
  "npm --version",
  "cd backend/scripts/structure_report_pdf && npm ci --omit=dev",
  "test -f backend/scripts/structure_report_pdf/render.mjs",
  "test -d backend/scripts/structure_report_pdf/node_modules/puppeteer",
  "bash -lc 'echo \"puppeteer import probe cwd=$(pwd)\" && node <<\"EOF\"\n(async () => {\n  try {\n    const p = await import(\"puppeteer\");\n    console.log(\"puppeteer export keys:\", Object.keys(p));\n    console.log(\"puppeteer ok\");\n  } catch (e) {\n    console.error(\"FULL ERROR:\");\n    console.error(e);\n    if (e && e.stack) console.error(e.stack);\n    console.error(\"cwd:\", process.cwd());\n    process.exit(1);\n  }\n})();\nEOF'",
  "which node",
]

[start]
cmd = "python3 run_server.py"
