# SASIST backend API — Railway config (path from repo root: /railway.toml).
# Backend service Root Directory MUST be / (repo root), NOT frontend/.
# Builder: Nixpacks (nixpacks.toml). See docs/RAILWAY_BACKEND.md

[build]
builder = "nixpacks"
watchPatterns = [
  "backend/**",
  "requirements.txt",
  "run_server.py",
  "nixpacks.toml",
  "railway.toml",
  "railway.json",
  "Procfile",
]

[deploy]
startCommand = "python3 run_server.py"
healthcheckPath = "/healthz"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
